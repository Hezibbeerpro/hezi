<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.excerpt | strip_html | truncatewords: 25 | default: site.description }}">

    <meta property="og:site_name" content="חזי באר">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncatewords: 25 | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    
    {% if page.image %}
      <meta property="og:image" content="{{ page.image | absolute_url }}">
    {% else %}
      <meta property="og:image" content="{{ site.url }}{{ site.clinic.hero_image }}">
    {% endif %}

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="preload" as="image" href="{{ site.clinic.hero_image | relative_url }}" media="(min-width: 601px)">
    <link rel="preload" as="image" href="{{ site.clinic.hero_image_mobile | relative_url }}" media="(max-width: 600px)">
    <link rel="preload" as="image" href="{{ site.clinic.profile_image_mobile | relative_url }}" media="(max-width: 600px)">
    <link rel="preload" as="image" href="{{ site.clinic.profile_image | relative_url }}" media="(min-width: 601px)">
</head>

<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" 
               class="nav-name {% if page.url == '/' or page.url == '/index.html' %}is-active{% endif %}">
               חזי באר
            </a>

            <a href="{{ '/articles/' | relative_url }}" 
               class="nav-link {% if page.url contains '/articles/' %}is-active{% endif %}">
               פרסומים
            </a>
            
            <a href="https://wa.me/{{ site.clinic.phone }}" target="_blank" class="nav-whatsapp-link">
                <img src="{{ '/assets/images/whatsapp-purple.png' | relative_url }}" alt="WhatsApp" class="header-wa-icon">
            </a>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

<footer class="main-footer">
    <div class="container">
        <div class="footer-contact">
            <h2>צרו קשר</h2>
            <p><strong>רוצים להתייעץ? אל תהססו, אני נהנה לעזור.</strong></p>
            
            <div class="contact-links-wrapper">
                <a href="tel:0523865888" class="contact-item">052-3865888</a>
                <a href="mailto:hezibeerpro@gmail.com" class="contact-item">hezibeerpro@gmail.com</a>
                <a href="https://wa.me/972523865888" class="contact-item whatsapp-footer">
                 <img src="{{ '/assets/images/whatsapp-purple.png' | relative_url }}" alt="WhatsApp" class="header-wa-icon">
                </a>
            </div>
        </div>

        <div class="footer-bottom">
            <div class="footer-copyright">
                 Ⓒ כל הזכויות שמורות לחזי באר
            </div>
            <div class="footer-legal-links">
                <a href="/accessibility.html">הצהרת נגישות</a>
                <a href="/privacy.html">מדיניות פרטיות</a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
