<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title | default: site.data.clinic.name }}</title>
    <meta name="description" content="{{ page.excerpt | strip_html | truncatewords: 25 | default: 'חזי באר - פסיכולוג קליני מומחה לטיפול CBT ב-OCD וחרדות בקרית אונו' }}">

    <meta property="og:site_name" content="{{ site.data.clinic.name }}">
    <meta property="og:title" content="{{ page.title | default: site.data.clinic.name }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncatewords: 25 | default: 'חזי באר - פסיכולוג קליני מומחה לטיפול CBT ב-OCD וחרדות' }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    
    {% if page.image %}
      <meta property="og:image" content="{{ page.image | absolute_url }}">
    {% else %}
      <meta property="og:image" content="{{ '/assets/images/branding/share-image.jpg' | absolute_url }}">
    {% endif %}
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="main-nav">
    <div class="nav-container">
        <a href="{{ '/' | relative_url }}" 
           class="nav-name {% if page.url == '/' or page.url == '/index.html' %}is-active{% endif %}">
           {{ site.data.clinic.name }}
        </a>

        <a href="{{ '/articles/' | relative_url }}" 
           class="nav-link {% if page.url contains '/articles/' %}is-active{% endif %}">
           פרסומים
        </a>
        
        <a href="https://wa.me/972523865888" target="_blank" class="nav-whatsapp-link">
            <img src="{{ '/assets/images/whatsapp-purple.png' | relative_url }}" alt="WhatsApp" class="header-wa-icon">
        </a>
    </div>
</nav>


    <main>
        {{ content }}
    </main>

    <footer class="container" style="text-align: center; padding: 40px 0; margin-top: 40px; border-top: 1px solid #e0e0e0;">
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.data.clinic.name }} | רישיון משרד הבריאות מס' {{ site.data.clinic.license_number }}</p>
    </footer>

    <button id="backToTop" title="חזרה למעלה">↑</button>
    <script>
        const btt = document.getElementById("backToTop");
        window.onscroll = () => { btt.classList.toggle("show", window.scrollY > 300); };
        btt.onclick = () => { window.scrollTo({top: 0, behavior: 'smooth'}); };
    </script>

</body>
</html>
