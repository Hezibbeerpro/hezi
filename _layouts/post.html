---
layout: default
---

<article class="post-wrapper">
    <header class="post-page-header">
        <div class="container split-header-container">
            
            <div class="header-text-side">
                <div class="post-meta-top">
                    <span class="author-name">חזי באר</span>
                    <span class="separator">•</span>
                    <time>{{ page.date | date: "%d/%m/%Y" }}</time>
                    <span class="separator">•</span>
                    <span class="read-time">
                    {% include read-time.html content=content %}
                    </span>
                </div>
                
                <h1 class="post-main-title">{{ page.title }}</h1>
                
                {% if page.excerpt %}
                <p class="post-subtitle">{{ page.excerpt | strip_html }}</p>
                {% endif %}

                <div class="post-action-bar">
                    <a href="https://api.whatsapp.com/send?text=קראתי מאמר מעניין של חזי באר: {{ page.title }} - {{ site.url }}{{ page.url }}" 
                       target="_blank" class="action-btn wa-btn" title="שתף בוואטסאפ">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.483 8.412-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.308 1.656zm6.29-4.143c1.589.943 3.385 1.44 5.216 1.441 5.44 0 9.865-4.427 9.867-9.867 0-2.639-1.027-5.118-2.892-6.984-1.866-1.867-4.346-2.895-6.985-2.896-5.44 0-9.866 4.426-9.869 9.868 0 1.908.54 3.768 1.562 5.354l-.995 3.634 3.715-.975zm11.014-6.973c-.273-.138-1.617-.798-1.868-.89-.25-.09-.432-.137-.614.137-.182.273-.706.89-.865 1.072-.158.183-.318.205-.59.069-.273-.137-1.15-.423-2.19-1.353-.809-.722-1.355-1.614-1.514-1.888-.159-.273-.017-.42.12-.556.122-.123.272-.319.408-.478.136-.16.182-.273.272-.455.09-.182.046-.341-.023-.478-.068-.137-.614-1.48-.84-2.026-.221-.535-.441-.462-.614-.471-.158-.008-.341-.01-.523-.01-.182 0-.477.068-.727.341-.25.273-.955.933-.955 2.277 0 1.345.977 2.641 1.114 2.823.136.182 1.922 2.934 4.655 4.114.65.28 1.157.447 1.553.573.654.207 1.248.178 1.718.108.523-.078 1.617-.661 1.845-1.3.227-.638.227-1.185.159-1.298-.069-.115-.25-.183-.523-.321z"/></svg>
                    </a>
                    
                    <button onclick="window.print()" class="action-btn print-btn" title="הדפס מאמר">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                    </button>
                </div>
            </div>

            {% if page.image and page.image != "" %}
            <div class="header-image-side">
                <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="featured-post-img">
            </div>
            {% endif %}
            
        </div>
    </header>

    <div class="container">
        <div class="post-content-area">
            {{ content }}
        </div>
    </div>
</article>
