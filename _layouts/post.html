---
layout: default
---

<article class="post-wrapper">
    <header class="post-page-header">
        <div class="container split-header-container">
            
            <div class="header-text-side">
                <div class="post-meta-top">
                    <span class="author-name">חזי באר</span>
                    <span class="separator">•</span>
                    <time>{{ page.date | date: "%d/%m/%Y" }}</time>
                    <span class="separator">•</span>
                    <span class="read-time">
                    {% include read-time.html content=content %}
                    </span>
                </div>
                
                <h1 class="post-main-title">{{ page.title }}</h1>
                
                {% if page.excerpt %}
                <p class="post-subtitle">{{ page.excerpt | strip_html }}</p>
                {% endif %}

                <div class="post-action-bar">
                    <a href="https://api.whatsapp.com/send?text=קראתי מאמר מעניין של חזי באר: {{ page.title }} - {{ site.url }}{{ page.url }}" 
                       target="_blank" class="action-btn wa-btn" title="שתף בוואטסאפ">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    
                    <button onclick="window.print()" class="action-btn print-btn" title="הדפס מאמר">
                        <i class="fas fa-print"></i>
                    </button>
                </div>
            </div>

            {% if page.image and page.image != "" %}
            <div class="header-image-side">
                <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="featured-post-img">
            </div>
            {% endif %}
            
        </div>
    </header>

    <div class="container">
        <div class="post-content-area">
            {{ content }}
        </div>
    </div>
</article>
