<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חזי באר</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>

    <nav class="main-nav">
    <div class="nav-container">
        <a href="/" class="nav-name">חזי באר</a>
        <a href="/articles/" class="nav-link">פרסומים</a>
    </div>
</nav>

    <main>
        <section class="articles-lobby">
    <div class="container">
        <h2 class="section-title">כל הפרסומים</h2>
        <p class="intro-text">תובנות, מאמרים ומידע מקצועי מעולם הטיפול הקוגניטיבי התנהגותי.</p>

        <div class="articles-grid">
            
            <p>בקרוב יעלו מאמרים חדשים...</p>
            
        </div>
    </div>
</section>
    </main>

    <footer class="container" style="text-align: center; padding: 40px 0; margin-top: 40px; border-top: 1px solid #e0e0e0;">
        <p>&copy; 2026 חזי באר | רישיון משרד הבריאות מס' </p>
    </footer>

    <button id="backToTop" title="חזרה למעלה">↑</button>
    <script>
        const btt = document.getElementById("backToTop");
        window.onscroll = () => { btt.classList.toggle("show", window.scrollY > 300); };
        btt.onclick = () => { window.scrollTo({top: 0, behavior: 'smooth'}); };
    </script>

</body>
</html>
