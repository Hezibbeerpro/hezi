        bully_status_q_f: `זה באמת לא פשוט. לחוות [somatic|את התחושות האלו בגוף] זו תגובה טבעית של המערכת כשהיא מזהה איום. זה מתיש להתמודד עם ההצפה הפיזית הזו בזמן שהראש גם ככה עמוס במחשבות פוגעות.<br /><br />מה הקול המזלזל והמתנשא אומר עכשיו? הוא ממשיך לתקוף? באותה עוצמה?<br />`,

        final_words_q_f: `עכשיו, אחרי שהסכמת להגיד ממה את מפחדת, מה את יכולה להגיד לקול המתנשא והמזלזל?`

<script>
    let currentGender = 'F'; 
    let currentStep = 0;
    let sessionData = {};

    const g = (maleText, femaleText) => currentGender === 'M' ? maleText : femaleText;
    const ft = window.fixedTexts;
    let pc;
    let chatFlow = [];

    function getGenderedQuestion(baseKey) {
        let text = "";
        if (currentGender === 'M' && pc[baseKey + "_m"]) {
            text = pc[baseKey + "_m"];
        } else if (currentGender === 'F' && pc[baseKey + "_f"]) {
            text = pc[baseKey + "_f"];
        } else {
            text = pc[baseKey] || "";
        }
        return smartTextParser(text);
    }

    function smartTextParser(text) {
        if (!text || typeof text !== 'string') return text;
        let parsedText = text;

        parsedText = parsedText.replace(/\[([a-zA-Z0-9_]+)\|([^\]]+)\]/g, (match, key, defaultVal) => {
            return sessionData[key] ? sessionData[key] : defaultVal;
        });

        parsedText = parsedText.replace(/\[([a-zA-Z0-9_]+)\]/g, (match, key) => {
            return sessionData[key] ? sessionData[key] : "";
        });

        // עדכון: מתבסס עכשיו על זה שיש רמה 1-10 במקום התשובה "כן"
        if (parsedText.includes("{COND_IMPORTANCE}")) {
            let condText = sessionData.importance_level ? `ציינת שהמשימה חשובה לך (ברמה ${sessionData.importance_level}). כשמשהו חשוב לנו, טבעי שהמערכת תיכנס לדריכות.\n\n` : "";
            parsedText = parsedText.replace("{COND_IMPORTANCE}", condText);
        }

        if (parsedText.includes("{COND_BULLY_STATUS}")) {
             let emp = "";
             if(sessionData.bully_status === "בעוצמה גבוהה יותר") {
                emp = g("זה כל כך קשה כשהוא מגביר את הווליום דווקא כשאתה מנסה לעשות מקום לפחד. זה דורש המון אומץ להישאר כאן.", "זה כל כך קשה כשהוא מגביר את הווליום דווקא כשאת מנסה לעשות מקום לפחד. זה דורש המון אומץ להישאר כאן.");
            } else if(sessionData.bully_status === "כן") {
                emp = g("לשמוע אותו ממשיך באותה עוצמה זה מתיש ומייאש, אבל אתה עושה עבודה מדהימה בעצם זה שאתה לא מוותר לו.", "לשמוע אותו ממשיך באותה עוצמה זה מתיש ומייאש, אבל את עושה עבודה מדהימה בעצם זה שאת לא מוותרת לו.");
            } else if(sessionData.bully_status === "בעוצמה נמוכה יותר") {
                emp = "זו הקלה לשמוע שהעוצמה קצת יורדת. זה מראה שהנוכחות שלך מתחילה לקחת לו את הכוח.";
            }
            parsedText = parsedText.replace("{COND_BULLY_STATUS}", emp);
        }

        return parsedText;
    }

    const chatHistory = document.getElementById('chat-history');
    const chatInput = document.getElementById('chat-input');
    const optionsArea = document.getElementById('options-area');
    const inputArea = document.getElementById('input-area');
    const progressBar = document.getElementById('progress-bar');
    const exportArea = document.getElementById('export-area-in-chat');

    document.addEventListener('DOMContentLoaded', () => {
        pc = window.patientConfigYaml || {};
        
        document.getElementById('app-main-title').innerText = pc.dialog_title || "תרגול קשיבות";
        document.getElementById('app-sub-title').innerText = pc.dialog_subtitle || "";
        document.getElementById('app-disclaimer').innerHTML = ft.disclaimer;
        document.getElementById('btn-start-f').innerText = ft.btn_start_f;
        document.getElementById('btn-start-m').innerText = ft.btn_start_m;

        // עדכון הרצף: הוסרה שאלת ה"כן/לא" והתנאי מהדירוג
        chatFlow = [
            { key: "location", question: () => ft.location_q(g) },
            { key: "task", question: () => ft.task_q },
            { key: "reason", question: () => ft.reason_q },
            { 
                key: "importance_level", 
                question: () => ft.importance_level_q, 
                inputType: "options", options: ft.importance_levels, 
                isScale: true, ltr: true
            },
            { key: "vulnerable", question: () => getGenderedQuestion('vulnerable_q') },
            { key: "bully", question: () => getGenderedQuestion('bully_q') },
            { key: "answer_bully", question: () => getGenderedQuestion('answer_bully_q') },
            { 
                key: "somatic", 
                question: () => ft.somatic_q(g),
                inputType: "options_and_text", multiSelect: true,
                options: ft.somatic_options
            },
            { 
                key: "bully_status", 
                question: () => getGenderedQuestion('bully_status_q'),
                inputType: "options", 
                options: pc.bully_status_options || ["כן", "בעוצמה גבוהה יותר", "בעוצמה נמוכה יותר"]
            },
            { key: "final_words", question: () => getGenderedQuestion('final_words_q') },
            { key: "feedback", question: () => ft.feedback_q(g) }
        ];

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        chatInput.addEventListener('input', function() {
            this.style.height = '48px';
            this.style.height = (this.scrollHeight) + 'px';
            scrollToBottom();
        });
    });

    function scrollToBottom() {
        requestAnimationFrame(() => {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        });
    }

    function startChat(gender) {
        currentGender = gender; 
        document.body.classList.add('app-active');
        document.documentElement.classList.add('app-active');
        document.getElementById('app-wrapper').classList.add('fullscreen-mode');
        
        document.getElementById('summary-thanks-text').innerText = g(
            "כל הכבוד על העבודה הפנימית. תוכל לשתף או לשמור את הדוח המלא.",
            "כל הכבוד על העבודה הפנימית. תוכלי לשתף או לשמור את הדוח המלא."
        );
        
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('chat-interface').style.display = 'flex';
        askQuestion(currentStep);
    }

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender === 'system' ? 'msg-system' : 'msg-user'}`;
        msgDiv.innerText = text;
        chatHistory.appendChild(msgDiv);
        scrollToBottom();
    }

    function askQuestion(step) {
        const percent = (step / chatFlow.length) * 100;
        progressBar.style.width = `${percent}%`;
        
        if (step >= chatFlow.length) {
            optionsArea.style.display = 'none';
            
            inputArea.style.display = 'flex';
            chatInput.disabled = true;
            chatInput.placeholder = "התרגול הסתיים";
            
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.style.opacity = '0.4';
            sendBtn.style.cursor = 'not-allowed';
            
            exportArea.style.display = 'block'; 
            chatHistory.appendChild(exportArea); 
            scrollToBottom();
            return;
        }

        const flow = chatFlow[step];
        if (flow.condition && !flow.condition(sessionData)) { 
            currentStep++; 
            return askQuestion(currentStep); 
        }
        
        const q = typeof flow.question === 'function' ? flow.question() : flow.question;
        addMessage(q, 'system');

        optionsArea.innerHTML = '';
        if (flow.inputType === 'options' || flow.inputType === 'options_and_text') {
            optionsArea.style.display = 'flex';
            if (flow.isScale) optionsArea.classList.add('scale-mode'); else optionsArea.classList.remove('scale-mode');
            optionsArea.style.direction = flow.ltr ? 'ltr' : 'rtl';
            flow.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if(flow.multiSelect) b.classList.toggle('selected');
                    else processInput(opt);
                };
                optionsArea.appendChild(b);
            });
        } else {
            optionsArea.style.display = 'none';
        }

        inputArea.style.display = flow.inputType === 'options' ? 'none' : 'flex';
        if (inputArea.style.display === 'flex') setTimeout(() => chatInput.focus(), 100);
    }

    function handleSend() {
        const flow = chatFlow[currentStep];
        let val = chatInput.value.trim();
        if (flow && flow.multiSelect) {
            const sel = Array.from(optionsArea.querySelectorAll('.option-btn.selected')).map(b => b.innerText);
            if (sel.length > 0) val = val ? `${sel.join(', ')}. בנוסף: ${val}` : sel.join(', ');
        }
        if (!val && flow.key !== 'feedback') return;
        processInput(val || ft.skip_text(g));
    }

    function processInput(text) {
        addMessage(text, 'user');
        sessionData[chatFlow[currentStep].key] = text;
        chatInput.value = '';
        chatInput.style.height = '48px';
        optionsArea.style.display = 'none';
        
        currentStep++;
        setTimeout(() => askQuestion(currentStep), 300);
    }

    function exportData(type) {
        const timestamp = new Date().toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'short' });
        const getVal = (key, defaultText = "לא צוין") => sessionData[key] ? sessionData[key] : defaultText;
        
        // עדכון הייצוא: אין יותר צורך לבדוק אם ענו "כן" קודם
        let importanceText = sessionData.importance_level ? `רמה ${sessionData.importance_level} מתוך 10` : "לא צוין";

        const reportText = `*${pc.dialog_title || "תרגול קשיבות"}* 📝\nתאריך: ${timestamp}\n\n*1. הקשר ומציאות*\n📍 *מיקום:* ${getVal('location')}\n🎯 *משימה:* ${getVal('task')}\n💡 *משמעות:* ${getVal('reason')}\n⚖️ *חשיבות:* ${importanceText}\n\n*2. מפת הקולות הפנימיים*\n🥺 *${pc.vulnerable_label || "החלק הפגיע"}*\n${getVal('vulnerable')}\n\n🗣️ *${pc.bully_label || "הבריון"}*\n"${getVal('bully')}"\n_${pc.answer_bully_label || "המחשבות הפוגעות"}_ ${getVal('answer_bully')}\n\n🫀 *תחושה פיזית בגוף:*\n${getVal('somatic')}\n\n*3. התמודדות וסיכום*\n🛡️ *${pc.bully_status_label || "סטטוס הבריון"}* ${getVal('bully_status')}\n💪 *${pc.final_words_label || "מילות סיום"}*\n${getVal('final_words')}\n\n✨ *רפלקציה:*\n${getVal('feedback')}`;

        if (type === 'sendToHezi') window.open(`https://wa.me/972523865888?text=${encodeURIComponent(reportText)}`, '_blank');

        else if (type === 'pdf') {
            let printArea = document.getElementById('print-area');
            printArea.innerHTML = `

                    <p style="text-align: center; color: #666; font-size: 12px; margin-top: 0; margin-bottom: 15px;">תאריך התבוננות: ${timestamp}</p>
                    <h2 style="color: #2c3e50; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-bottom: 8px; margin-top: 0;">1. מציאות והקשר</h2>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px;">
                        <tr><td style="padding: 4px 0; border-bottom: 1px solid #eee; width: 15%;"><strong>מיקום:</strong></td><td style="padding: 4px 0; border-bottom: 1px solid #eee; width: 35%;">${getVal('location')}</td><td style="padding: 4px 0; border-bottom: 1px solid #eee; width: 15%;"><strong>חשיבות:</strong></td><td style="padding: 4px 0; border-bottom: 1px solid #eee; width: 35%;">${importanceText}</td></tr>
                        <tr><td style="padding: 4px 0; border-bottom: 1px solid #eee;"><strong>משימה:</strong></td><td style="padding: 4px 0; border-bottom: 1px solid #eee;" colspan="3">${getVal('task')}</td></tr>
                        <tr><td style="padding: 4px 0; border-bottom: 1px solid #eee;"><strong>משמעות:</strong></td><td style="padding: 4px 0; border-bottom: 1px solid #eee;" colspan="3">${getVal('reason')}</td></tr>
                    </table>
                    <h2 style="color: #2c3e50; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-bottom: 10px;">2. מפת הקולות הפנימיים וההתמודדות</h2>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px;">
                        <div class="print-box" style="background-color: #e1f5fe; padding: 12px; border-right: 4px solid #81d4fa; border-radius: 6px;"><h3 style="color: #0277bd; margin-top: 0; font-size: 14px; margin-bottom: 5px;">🥺 ${pc.vulnerable_label || "החלק הפגיע"}</h3><p style="font-size: 13px; margin-bottom: 0; line-height: 1.4;">${getVal('vulnerable')}</p></div>
                        <div class="print-box" style="background-color: #fce4ec; padding: 12px; border-right: 4px solid #f48fb1; border-radius: 6px;"><h3 style="color: #c2185b; margin-top: 0; font-size: 14px; margin-bottom: 5px;">🗣️ ${pc.bully_label || "הבריון"}</h3><p style="font-size: 13px; margin-bottom: 4px; line-height: 1.4;">"${getVal('bully')}"</p><p style="font-size: 11px; color: #555; margin-bottom: 0; line-height: 1.3;"><strong>${pc.answer_bully_label || "המחשבות הפוגעות"}</strong> ${getVal('answer_bully')}</p></div>
                        <div class="print-box" style="background-color: #fff3e0; padding: 12px; border-right: 4px solid #ffcc80; border-radius: 6px;"><h3 style="color: #e65100; margin-top: 0; font-size: 14px; margin-bottom: 5px;">🫀 תחושה פיזית בגוף:</h3><p style="font-size: 13px; margin-bottom: 0; line-height: 1.4;">${getVal('somatic')}</p></div>
                        <div class="print-box" style="background-color: #e8f5e9; padding: 12px; border-right: 4px solid #81c784; border-radius: 6px;"><h3 style="color: #2e7d32; margin-top: 0; font-size: 14px; margin-bottom: 5px;">🛡️ ${pc.final_words_label || "מילות סיום"}</h3><p style="font-size: 12px; margin-bottom: 4px;"><strong>${pc.bully_status_label || "סטטוס הבריון"}</strong> ${getVal('bully_status')}</p><p style="font-size: 13px; font-weight: bold; margin-bottom: 0; line-height: 1.4;">${getVal('final_words')}</p></div>
                    </div>
                    <h2 style="color: #2c3e50; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-bottom: 10px;">3. סיכום התהליך</h2>
                    <div class="print-box" style="background-color: #f8f1fb; padding: 12px; border: 1px solid #9b59b6; border-radius: 6px;"><h3 style="color: #9b59b6; margin-top: 0; font-size: 14px; margin-bottom: 5px;">✨ רפלקציה ופידבק אישי:</h3><p style="font-size: 13px; margin-bottom: 0; line-height: 1.4;">${getVal('feedback')}</p></div>
                </div>`;
            setTimeout(() => { window.print(); }, 300);
        }
    }
