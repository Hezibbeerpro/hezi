<style>
    .export-buttons-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 25px;
        width: 100%;
    }

    .btn-export-v3 {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 15px;
        border-radius: 14px;
        border: none;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        color: white;
        width: 100%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* כפתור ווטסאפ סגול - מיתוג חזי באר */
    .btn-whatsapp-hezi {
        background-color: var(--primary-purple) !important;
    }

    /* כפתור PDF אדום - סגנון אקרובט */
    .btn-pdf-acrobat {
        background-color: #e74c3c !important; /* אדום מקצועי */
    }

    /* כפתור העתקה ניטרלי */
    .btn-copy-neutral {
        background-color: #f8f9fa !important;
        color: #555 !important;
        border: 1px solid #eee !important;
    }

    .btn-export-v3:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        opacity: 0.95;
    }

    .btn-export-v3:active {
        transform: translateY(0);
    }

    .btn-icon-svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
    }
</style>
