<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preload" as="image" href="{{ site.data.clinic.hero_image | relative_url }}" media="(min-width: 601px)">
    <link rel="preload" as="image" href="{{ site.data.clinic.hero_image_mobile | relative_url }}" media="(max-width: 600px)">
    <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
    
    {% seo %}
    
<meta property="og:image" content="https://hezibeer.co.il/assets/images/branding/profile.jpg" />
