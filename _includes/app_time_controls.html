<style>
    .time-date-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .picker-container { position: relative; flex: 1; min-width: 140px; }
    .custom-label { display: block; font-size: 0.95rem; color: #555; margin-bottom: 8px; font-weight: 600; }
    
    .date-trigger { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #fafafa; cursor: pointer; text-align: right; font-size: 1rem; transition: border-color 0.2s; position: relative; }
    .date-menu { display: none; position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); z-index: 100; overflow: hidden; }
    .date-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; font-size: 0.95rem; }
    .date-item:last-child { border-bottom: none; }
    .date-item:hover { background: #fdfaff; color: var(--primary-purple); }
    
    .digital-picker { display: inline-flex; align-items: center; background: #fafafa; border: 2px solid #eee; border-radius: 12px; padding: 8px 12px; direction: ltr; justify-content: center; gap: 8px; min-width: 180px; }
    .digital-icon { font-size: 1.1rem; margin-right: 5px; filter: grayscale(1); opacity: 0.7; }
    
    /* הוספת touch-action: none חיונית כדי שהגלילה באצבע תעבוד חלקה בלי לגלול את כל העמוד */
    .unit-scroll { display: flex; flex-direction: column; align-items: center; width: 30px; cursor: ns-resize; user-select: none; font-size: 1.2rem; font-weight: 400; color: #333; touch-action: none; }
    .separator-dots { font-size: 1.2rem; color: var(--primary-purple); padding-bottom: 2px; }

    @media (max-width: 600px) { .time-date-row { flex-direction: column; align-items: stretch; } .digital-picker { width: 100%; } }
</style>

<div class="time-date-row">
    <div class="picker-container">
        <label class="custom-label">תאריך:</label>
        <div id="date-display" class="date-trigger" onclick="toggleDateMenu()">טוען...</div>
        <div id="date-menu" class="date-menu"></div>
    </div>

    <div class="picker-container">
        <label class="custom-label">{{ include.time_label | default: 'שעה:' }}</label>
        <div class="digital-picker">
            <span class="digital-icon">🕒</span>
            <div class="unit-scroll" id="start-h" data-max="23" onwheel="handleWheel(event, 'start-h', 23)">00</div>
            <span class="separator-dots">:</span>
            <div class="unit-scroll" id="start-m" data-max="59" onwheel="handleWheel(event, 'start-m', 59)">00</div>
        </div>
    </div>

    <div class="picker-container">
        <label class="custom-label">{{ include.duration_label | default: 'משך:' }}</label>
        <div class="digital-picker">
            <span class="digital-icon">⏳</span>
            <div class="unit-scroll" id="dur-h" data-max="12" onwheel="handleWheel(event, 'dur-h', 12)">00</div>
            <span class="separator-dots">:</span>
            <div class="unit-scroll" id="dur-m" data-max="59" onwheel="handleWheel(event, 'dur-m', 59)">00</div>
        </div>
    </div>
</div>

<script>
    let selectedFullDate = "";

    function initAppControls() {
        // אתחול התאריך
        const menu = document.getElementById('date-menu');
        const display = document.getElementById('date-display');
        const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
        menu.innerHTML = '';
        
        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            let dd = String(d.getDate()).padStart(2, '0');
            let mm = String(d.getMonth() + 1).padStart(2, '0');
            let yyyy = d.getFullYear();
            
            let label = i === 0 ? "היום" : i === 1 ? "אתמול" : i === 2 ? "שלשום" : "יום " + dayNames[d.getDay()];
            let text = `${label} (${dd}/${mm})`;
            let val = `${dd}/${mm}/${yyyy}`;
            
            let div = document.createElement('div');
            div.className = 'date-item';
            div.innerText = text;
            div.onclick = () => {
                selectedFullDate = val;
                display.innerText = text;
                toggleDateMenu();
            };
            menu.appendChild(div);

            if (i === 0) {
                selectedFullDate = val;
                display.innerText = text;
            }
        }

        // אתחול הזמנים (שעה נוכחית ו-00:00 למשך)
        const now = new Date();
        updateTimeDisplay('start-h', now.getHours());
        updateTimeDisplay('start-m', now.getMinutes());
        updateTimeDisplay('dur-h', 0);
        updateTimeDisplay('dur-m', 0);

        // *** הוספת תמיכה בגלילת מגע (Swipe) בנייד ***
        document.querySelectorAll('.unit-scroll').forEach(el => {
            let startY = 0;
            let startVal = 0;
            
            el.addEventListener('touchstart', e => {
                startY = e.touches[0].clientY;
                startVal = parseInt(el.innerText);
            }, {passive: true});

            el.addEventListener('touchmove', e => {
                e.preventDefault(); // עוצר גלילה של כל המסך בעת בחירת מספר
                let currentY = e.touches[0].clientY;
                let diff = startY - currentY;
                let steps = Math.floor(diff / 15); // כל 15 פיקסלים מעלים/מורידים ספרה
                
                let max = parseInt(el.getAttribute('data-max'));
                let newVal = startVal + steps;
                
                // מתמטיקה סיבובית (Wrap around)
                let modVal = ((newVal % (max + 1)) + (max + 1)) % (max + 1);
                el.innerText = String(modVal).padStart(2, '0');
            }, {passive: false});
        });
    }

    function toggleDateMenu() {
        const menu = document.getElementById('date-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('click', function(event) {
        const menu = document.getElementById('date-menu');
        const trigger = document.getElementById('date-display');
        if (menu && menu.style.display === 'block' && event.target !== menu && event.target !== trigger) {
            menu.style.display = 'none';
        }
    });

    function updateTimeDisplay(id, val) {
        document.getElementById(id).innerText = String(val).padStart(2, '0');
    }

    function handleWheel(e, id, max) {
        e.preventDefault();
        let current = parseInt(document.getElementById(id).innerText);
        if (e.deltaY < 0) { current = current >= max ? 0 : current + 1; } 
        else { current = current <= 0 ? max : current - 1; }
        updateTimeDisplay(id, current);
    }

    // פונקציה מרכזית למשיכת נתוני הזמן והתאריך
    function getAppTimeData() {
        const hStart = document.getElementById('start-h').innerText;
        const mStart = document.getElementById('start-m').innerText;
        const hDur = parseInt(document.getElementById('dur-h').innerText);
        const mDur = parseInt(document.getElementById('dur-m').innerText);
        
        let durationText = "";
        if (hDur === 0 && mDur === 0) durationText = "פחות מדקה";
        else if (hDur === 0) durationText = `${mDur} דקות`;
        else if (mDur === 0) durationText = hDur === 1 ? "שעה אחת" : `${hDur} שעות`;
        else durationText = (hDur === 1 ? "שעה" : `${hDur} שעות`) + ` ו-${mDur} דקות`;

        return {
            date: selectedFullDate,
            time: `${hStart}:${mStart}`,
            duration: durationText
        };
    }
</script>
