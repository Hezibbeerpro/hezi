<style>
    .time-date-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .picker-container { position: relative; flex: 1; min-width: 140px; }
    .custom-label { display: block; font-size: 0.95rem; color: #555; margin-bottom: 8px; font-weight: 600; }
    
    .date-trigger { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #fafafa; cursor: pointer; text-align: right; font-size: 1rem; transition: border-color 0.2s; position: relative; }
    .date-menu { display: none; position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); z-index: 100; overflow: hidden; }
    .date-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; font-size: 0.95rem; }
    .date-item:last-child { border-bottom: none; }
    .date-item:hover { background: #fdfaff; color: var(--primary-purple); }
    
    .digital-picker { display: inline-flex; align-items: center; background: #fafafa; border: 2px solid #eee; border-radius: 12px; padding: 8px 12px; direction: ltr; justify-content: center; gap: 8px; min-width: 180px; }
    .digital-icon { font-size: 1.1rem; margin-right: 5px; filter: grayscale(1); opacity: 0.7; }
    .separator-dots { font-size: 1.2rem; color: var(--primary-purple); padding-bottom: 2px; }
    
    /* Desktop Input Styles */
    input.unit-scroll {
        width: 36px;
        font-size: 1.3rem;
        font-weight: 600;
        color: #333;
        background: transparent;
        border: none;
        outline: none;
        text-align: center;
        font-family: inherit;
        -moz-appearance: textfield;
        padding: 2px;
        cursor: ns-resize;
    }
    input.unit-scroll::-webkit-outer-spin-button,
    input.unit-scroll::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input.unit-scroll:focus { background: rgba(155, 89, 182, 0.1); border-radius: 6px; cursor: text; }

    /* Responsive Switching (Desktop vs Mobile) */
    .desktop-picker { display: inline-flex; }
    .mobile-picker { display: none; }
    
    @media (max-width: 600px) { 
        .time-date-row { flex-direction: column; align-items: stretch; } 
        .desktop-picker { display: none !important; }
        .mobile-picker { display: flex !important; width: 100%; gap: 10px;}
        .mobile-picker .seamless-input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 12px; background: #fafafa; font-size: 1.1rem; text-align: center; font-family: inherit; }
        .mobile-picker .seamless-input:focus { border-color: var(--primary-purple); outline: none; }
    }
</style>

<div class="time-date-row">
    <div class="picker-container">
        <label class="custom-label">תאריך:</label>
        <div id="date-display" class="date-trigger" onclick="toggleDateMenu()">טוען...</div>
        <div id="date-menu" class="date-menu"></div>
    </div>

    <div class="picker-container">
        <label class="custom-label">{{ include.time_label | default: 'שעה:' }}</label>
        <div class="digital-picker desktop-picker">
            <span class="digital-icon">🕒</span>
            <input type="text" inputmode="numeric" class="unit-scroll" id="desktop-start-h" data-max="23" onwheel="handleWheel(event, this)" oninput="handleTyping(this)" onblur="formatBlur(this)">
            <span class="separator-dots">:</span>
            <input type="text" inputmode="numeric" class="unit-scroll" id="desktop-start-m" data-max="59" onwheel="handleWheel(event, this)" oninput="handleTyping(this)" onblur="formatBlur(this)">
        </div>
        <div class="mobile-picker">
            <input type="time" id="mobile-start-time" class="seamless-input">
        </div>
    </div>

    <div class="picker-container">
        <label class="custom-label">{{ include.duration_label | default: 'משך:' }}</label>
        <div class="digital-picker desktop-picker">
            <span class="digital-icon">⏳</span>
            <input type="text" inputmode="numeric" class="unit-scroll" id="desktop-dur-h" data-max="12" onwheel="handleWheel(event, this)" oninput="handleTyping(this)" onblur="formatBlur(this)">
            <span class="separator-dots">:</span>
            <input type="text" inputmode="numeric" class="unit-scroll" id="desktop-dur-m" data-max="59" onwheel="handleWheel(event, this)" oninput="handleTyping(this)" onblur="formatBlur(this)">
        </div>
        <div class="mobile-picker" style="direction: ltr;">
            <select id="mobile-dur-h" class="seamless-input" style="flex: 1; text-align: center;"></select>
            <span style="align-self: center; font-size: 1.5rem; font-weight: bold; color: var(--primary-purple); margin-bottom: 5px;">:</span>
            <select id="mobile-dur-m" class="seamless-input" style="flex: 1; text-align: center;"></select>
        </div>
    </div>
</div>

<script>
    let selectedFullDate = "";

    function initAppControls() {
        // אתחול התאריך
        const menu = document.getElementById('date-menu');
        const display = document.getElementById('date-display');
        const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
        menu.innerHTML = '';
        
        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            let dd = String(d.getDate()).padStart(2, '0');
            let mm = String(d.getMonth() + 1).padStart(2, '0');
            let yyyy = d.getFullYear();
            
            let label = i === 0 ? "היום" : i === 1 ? "אתמול" : i === 2 ? "שלשום" : "יום " + dayNames[d.getDay()];
            let text = `${label} (${dd}/${mm})`;
            let val = `${dd}/${mm}/${yyyy}`;
            
            let div = document.createElement('div');
            div.className = 'date-item';
            div.innerText = text;
            div.onclick = () => {
                selectedFullDate = val;
                display.innerText = text;
                toggleDateMenu();
            };
            menu.appendChild(div);

            if (i === 0) {
                selectedFullDate = val;
                display.innerText = text;
            }
        }

        // אתחול זמנים - מחשב
        const now = new Date();
        document.getElementById('desktop-start-h').value = String(now.getHours()).padStart(2, '0');
        document.getElementById('desktop-start-m').value = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('desktop-dur-h').value = "00";
        document.getElementById('desktop-dur-m').value = "00";

        // אתחול זמנים - מובייל
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('mobile-start-time').value = `${hh}:${mm}`;

        let durH = document.getElementById('mobile-dur-h');
        let durM = document.getElementById('mobile-dur-m');
        for(let i=0; i<=12; i++) durH.options.add(new Option(String(i).padStart(2,'0'), i));
        for(let i=0; i<=59; i++) durM.options.add(new Option(String(i).padStart(2,'0'), i));
        durH.value = 0;
        durM.value = 0;
    }

    function toggleDateMenu() {
        const menu = document.getElementById('date-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('click', function(event) {
        const menu = document.getElementById('date-menu');
        const trigger = document.getElementById('date-display');
        if (menu && menu.style.display === 'block' && event.target !== menu && event.target !== trigger) {
            menu.style.display = 'none';
        }
    });

    // פונקציות לשדות המחשב (הקלדה וגלילה)
    function handleTyping(el) {
        let val = el.value.replace(/\D/g, ''); // הסרת כל תו שאינו מספר
        let max = parseInt(el.getAttribute('data-max'));
        if (val !== '') {
            let num = parseInt(val);
            if (num > max) num = max; // הגבלת ערך מקסימלי
            el.value = num;
        } else {
            el.value = '';
        }
    }

    function formatBlur(el) {
        if(el.value === '') el.value = '00';
        else el.value = String(parseInt(el.value)).padStart(2, '0'); // הוספת אפס מוביל ביציאה מהשדה
    }

    function handleWheel(e, el) {
        e.preventDefault();
        if(document.activeElement !== el) el.focus();
        let current = parseInt(el.value) || 0;
        let max = parseInt(el.getAttribute('data-max'));
        if (e.deltaY < 0) { current = current >= max ? 0 : current + 1; } 
        else { current = current <= 0 ? max : current - 1; }
        el.value = String(current).padStart(2, '0');
    }

    // איסוף הנתונים המאוחד (בודק אם אנחנו במובייל או במחשב)
    function getAppTimeData() {
        let isMobile = window.matchMedia("(max-width: 600px)").matches;
        let timeStr, hDur, mDur;
        
        if (isMobile) {
            timeStr = document.getElementById('mobile-start-time').value || "00:00";
            hDur = parseInt(document.getElementById('mobile-dur-h').value) || 0;
            mDur = parseInt(document.getElementById('mobile-dur-m').value) || 0;
        } else {
            let hStart = document.getElementById('desktop-start-h').value;
            let mStart = document.getElementById('desktop-start-m').value;
            timeStr = `${String(parseInt(hStart)||0).padStart(2,'0')}:${String(parseInt(mStart)||0).padStart(2,'0')}`;
            hDur = parseInt(document.getElementById('desktop-dur-h').value) || 0;
            mDur = parseInt(document.getElementById('desktop-dur-m').value) || 0;
        }
        
        let durationText = "";
        if (hDur === 0 && mDur === 0) durationText = "פחות מדקה";
        else if (hDur === 0) durationText = `${mDur} דקות`;
        else if (mDur === 0) durationText = hDur === 1 ? "שעה אחת" : `${hDur} שעות`;
        else durationText = (hDur === 1 ? "שעה" : `${hDur} שעות`) + ` ו-${mDur} דקות`;

        return {
            date: selectedFullDate,
            time: timeStr,
            duration: durationText
        };
    }
</script>
