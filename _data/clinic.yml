about_p1: "אני רואה חשבון, פסיכולוג קליני מומחה ויועץ קוגניטיבי-התנהגותי. בעל קליניקה בה אני פוגש נוער, צעירים, מבוגרים והורים. אני משלב בין עולם הפסיכולוגיה הקלינית לבין כלים מעולם הפסיכולוגיה החיובית והאימון העסקי."
about_p2: "הבסיס המקצועי שלי נשען על למידה אקדמית עמוקה: אני בוגר תואר ראשון בפסיכולוגיה, ניהול, כלכלה וחשבונאות מאוניברסיטת תל אביב, ומוסמך תואר שני בפסיכולוגיה קלינית מהאוניברסיטה העברית."

