---
layout: default
title: פרסומים
---

<section class="articles-lobby">
    <div class="container">
        <h2 class="section-title">כל הפרסומים</h2>
        <p class="intro-text">תובנות, מאמרים ומידע מקצועי מעולם הטיפול הקוגניטיבי התנהגותי.</p>

        <div class="articles-grid">
            {% for post in site.posts %}
            <article class="article-card">
                <div class="card-content">
                    <span class="card-tag">{{ post.category }}</span>
                    <h3 class="card-title">{{ post.title }}</h3>
                    <p class="card-excerpt">{{ post.excerpt | strip_html | truncatewords: 20 }}</p>
                    <a href="{{ post.url | relative_url }}" class="read-more">קרא עוד ←</a>
                </div>
            </article>
            {% else %}
            <p>בקרוב יעלו מאמרים חדשים...</p>
            {% endfor %}
        </div>
    </div>
</section>
